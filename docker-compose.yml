version: '3.8'

services:
  school-management:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-management-system
    ports:
      - "5000:5000"
    volumes:
      # 持久化数据库文件
      - school-data:/app/data
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - DB_PATH=/app/data/school.db
      - HOST=0.0.0.0
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  school-data:
    driver: local
