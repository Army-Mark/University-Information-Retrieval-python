version: '3.8'

services:
  school-app:
    build: .
    container_name: school-info-system
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logo:/app/logo
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - DB_PATH=/app/data/school.db
      - FLASK_DEBUG=false
      - SECRET_KEY=change-this-secret-key-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 10s
    networks:
      - school-network

networks:
  school-network:
    driver: bridge
