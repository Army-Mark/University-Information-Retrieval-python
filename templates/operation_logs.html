<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作日志 - 高校信息管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px 80px;
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 80px);
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 36px;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .header-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .user-area {
            position: absolute;
            right: 0;
        }
        
        .username {
            color: #667eea;
            font-size: 16px;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .username:hover {
            color: #764ba2;
        }
        
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }
        
        .btn-back {
            background-color: #95a5a6;
            color: white;
            text-decoration: none;
        }
        
        .btn-danger:hover {
            background-color: #c0392b;
        }
        
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            margin-top: -5px;
        }
        
        .actions-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .logs-table-container {
            max-height: calc(100vh - 300px);
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }
        
        .logs-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .logs-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .logs-table th,
        .logs-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .logs-table th {
            font-weight: 600;
            font-size: 14px;
        }
        
        .logs-table tbody tr:hover {
            background-color: #f8f9fa;
        }
        
        .logs-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        .operation-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
        }
        
        .operation-type.create {
            background-color: #d4edda;
            color: #155724;
        }
        
        .operation-type.update {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .operation-type.delete {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .checkbox-cell {
            width: 40px;
        }
        
        .detail-content {
            max-width: 400px;
            word-break: break-word;
            line-height: 1.6;
            font-size: 13px;
            color: #555;
        }
        
        .diff-arrow {
            color: #667eea;
            font-weight: bold;
            margin: 0 8px;
        }
        
        .diff-old {
            color: #e74c3c;
        }
        
        .diff-new {
            color: #27ae60;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .confirm-modal {
            background-color: white;
            padding: 40px 50px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        
        .modal-message {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .modal-btn-cancel {
            background-color: #f0f0f0;
            color: #666;
        }
        
        .modal-btn-cancel:hover {
            background-color: #e0e0e0;
        }
        
        .modal-btn-confirm {
            background-color: #e74c3c;
            color: white;
        }
        
        .modal-btn-confirm:hover {
            background-color: #c0392b;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        #selectAll {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 20px;
        }
        
        .select-all-label {
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            
            .card {
                padding: 30px 20px;
                border-radius: 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .logs-table th,
            .logs-table td {
                padding: 12px 10px;
                font-size: 13px;
            }
            
            .detail-content {
                max-width: 200px;
            }
            
            .confirm-modal {
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-section">
            <h1>操作日志</h1>
            <div class="user-area">
                <span class="username" id="username"></span>
            </div>
        </div>
        
        <div class="actions-bar">
            <label id="selectAll">
                <input type="checkbox" id="selectAllCheckbox">
                <span class="select-all-label">全选</span>
            </label>
            <div class="actions-right">
                <a href="/" class="btn btn-back">返回首页</a>
                <button class="btn btn-danger" onclick="showDeleteConfirm()">删除日志</button>
            </div>
        </div>
        
        <div class="logs-table-container">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th class="checkbox-cell"></th>
                        <th style="width: 60px;">ID</th>
                        <th style="width: 80px;">操作类型</th>
                        <th style="width: 100px;">操作账户</th>
                        <th style="width: 100px;">记录ID</th>
                        <th style="width: 150px;">操作时间</th>
                        <th>详细内容</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                </tbody>
            </table>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
    </div>
    
    <div class="modal-overlay" id="deleteModal">
        <div class="confirm-modal">
            <div class="modal-title">确认删除</div>
            <div class="modal-message" id="deleteMessage">确定要删除选中的日志吗？此操作不可恢复。</div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" onclick="hideDeleteModal()">取消</button>
                <button class="modal-btn modal-btn-confirm" onclick="deleteSelectedLogs()">确定删除</button>
            </div>
        </div>
    </div>
    
    <script>
        let logs = [];
        
        async function loadLogs() {
            try {
                const response = await fetch('/get_operation_logs');
                const data = await response.json();
                if (data.success) {
                    logs = data.logs;
                    renderLogs();
                }
            } catch (error) {
                console.error('加载日志错误:', error);
            }
        }
        
        function renderLogs() {
            const logsBody = document.getElementById('logsBody');
            if (!logs || logs.length === 0) {
                logsBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: #666;">暂无操作日志</td></tr>';
                return;
            }
            
            logsBody.innerHTML = logs.map(log => {
                const detailContent = formatDetailContent(log);
                return `
                    <tr data-id="${log.id}">
                        <td class="checkbox-cell"><input type="checkbox" class="log-checkbox" value="${log.id}"></td>
                        <td>${log.id}</td>
                        <td><span class="operation-type ${log.operation_type.toLowerCase()}">${getOperationLabel(log.operation_type)}</span></td>
                        <td>${log.username || '-'}</td>
                        <td>${log.record_id}</td>
                        <td>${log.operation_time}</td>
                        <td class="detail-content">${detailContent}</td>
                    </tr>
                `;
            }).join('');
        }
        
        function getOperationLabel(type) {
            const labels = {
                'CREATE': '创建',
                'UPDATE': '更新',
                'DELETE': '删除'
            };
            return labels[type] || type;
        }
        
        function formatDetailContent(log) {
            let content = '';
            let schoolName = '';
            
            try {
                let oldData = null;
                let newData = null;
                
                if (log.old_data && typeof log.old_data === 'string') {
                    try {
                        oldData = JSON.parse(log.old_data);
                    } catch (e) {
                        oldData = null;
                    }
                }
                
                if (log.new_data && typeof log.new_data === 'string') {
                    try {
                        newData = JSON.parse(log.new_data);
                    } catch (e) {
                        newData = null;
                    }
                }
                
                if (log.table_name === 'universities') {
                    schoolName = newData && newData['name'] ? newData['name'] : 
                                oldData && oldData['name'] ? oldData['name'] : '';
                    content = '更新了学校信息';
                    if (schoolName) {
                        content += ': ' + schoolName;
                    }
                } else if (log.table_name === 'users') {
                    content = '更新了用户信息';
                } else {
                    content = `${getOperationLabel(log.operation_type)}了${log.table_name}记录`;
                }
                
                if ((log.operation_type === 'update' || log.operation_type === 'UPDATE')) {
                    if (oldData && newData) {
                        const diffContent = getDiffContent(oldData, newData);
                        if (diffContent) {
                            content += '<br>' + diffContent;
                        }
                    }
                }
            } catch (e) {
                console.error('解析日志数据错误:', e);
                if (log.table_name === 'universities') {
                    content = '更新了学校信息';
                } else if (log.table_name === 'users') {
                    content = '更新了用户信息';
                } else {
                    content = `${getOperationLabel(log.operation_type)}了${log.table_name}记录`;
                }
            }
            
            return content;
        }
        
        function getDiffContent(oldData, newData) {
            const fieldLabels = {
                'id': '学校ID',
                'name': '学校名称',
                'address': '地址',
                'category': '类别',
                'nature': '性质',
                'department': '归属部门',
                'tags': '标签',
                'founded_year': '建校时间',
                'area': '占地面积',
                'basic_info': '简介',
                'logo_path': 'Logo路径',
                'username': '用户名',
                'password': '密码',
                'role': '角色'
            };
            
            let diffContent = '';
            
            for (const key of Object.keys(oldData)) {
                if (oldData[key] !== newData[key]) {
                    const label = fieldLabels[key] || key;
                    const oldValue = String(oldData[key] || '');
                    const newValue = String(newData[key] || '');
                    
                    if (oldValue !== newValue) {
                        const displayOld = oldValue.length > 100 ? oldValue.substring(0, 100) + '...' : oldValue;
                        const displayNew = newValue.length > 100 ? newValue.substring(0, 100) + '...' : newValue;
                        diffContent += `${label}: <span class="diff-old">${escapeHtml(displayOld)}</span> <span class="diff-arrow">→</span> <span class="diff-new">${escapeHtml(displayNew)}</span><br>`;
                    }
                }
            }
            
            return diffContent;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.log-checkbox');
            const selectAllCheckbox = document.getElementById('selectAllCheckbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAllCheckbox.checked;
            });
        }
        
        document.getElementById('selectAllCheckbox').addEventListener('change', toggleSelectAll);
        
        function getSelectedIds() {
            const checkboxes = document.querySelectorAll('.log-checkbox:checked');
            return Array.from(checkboxes).map(cb => parseInt(cb.value));
        }
        
        function showDeleteConfirm() {
            const selectedIds = getSelectedIds();
            if (selectedIds.length === 0) {
                document.getElementById('errorMessage').textContent = '请先选择要删除的日志';
                document.getElementById('errorMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 2000);
                return;
            }
            
            document.getElementById('deleteMessage').textContent = `确定要删除选中的 ${selectedIds.length} 条日志吗？此操作不可恢复。`;
            document.getElementById('deleteModal').classList.add('show');
        }
        
        function hideDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
        }
        
        async function deleteSelectedLogs() {
            const selectedIds = getSelectedIds();
            
            try {
                const response = await fetch('/delete_operation_logs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ids: selectedIds })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    hideDeleteModal();
                    loadLogs();
                } else {
                    hideDeleteModal();
                    alert(data.message);
                }
            } catch (error) {
                console.error('删除日志错误:', error);
                hideDeleteModal();
                alert('删除失败，请重试');
            }
        }
        
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideDeleteModal();
            }
        });
        
        async function checkLoginStatus() {
            try {
                const response = await fetch('/check_login');
                const data = await response.json();
                if (data.logged_in) {
                    const usernameElement = document.getElementById('username');
                    usernameElement.innerHTML = `<a href="/account" style="color: #667eea; text-decoration: underline;">${data.username}</a>`;
                }
            } catch (error) {
                console.error('检查登录状态错误:', error);
            }
        }
        
        checkLoginStatus();
        loadLogs();
    </script>
</body>
</html>
